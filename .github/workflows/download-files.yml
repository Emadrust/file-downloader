name: Download Files on Windows

on:
  workflow_dispatch:  # Manual trigger

jobs:
  download:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download a file
      run: |
        Invoke-WebRequest -Uri "https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png" -OutFile "PNG_transparency_demonstration_1.png"
      shell: pwsh