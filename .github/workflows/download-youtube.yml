name: Download YouTube Video to Repo with Git LFS

on:
  workflow_dispatch:

jobs:
  download_and_commit:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the repo with LFS support
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      # Step 2: Install yt-dlp and Git LFS
      - name: Install yt-dlp and Git LFS
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
          git lfs install
        shell: pwsh

      # Step 3: Download the YouTube video
      - name: Download YouTube video
        run: |
          # Replace with your YouTube video URL
          yt-dlp "https://www.youtube.com/watch?v=dQw4w9WgXcQ" -o "video.mp4"
        shell: pwsh

      # Step 4: Track the video file with Git LFS
      - name: Track video with Git LFS
        run: |
          git lfs track "*.mp4"
          git add .gitattributes
        shell: pwsh

      # Step 5: Commit and push the video
      - name: Commit video to repository
        run: |
          if (Test-Path video.mp4) {
            git add video.mp4
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            # Only commit if changes exist
            git diff --cached --quiet || git commit -m "Add downloaded YouTube video via Git LFS"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
          } else {
            Write-Host "Video file not found, skipping commit."
          }
        shell: pwsh