name: Download YouTube Video

# Manual trigger from the Actions tab
on:
  workflow_dispatch:

jobs:
  download_youtube:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the repo (needed for actions)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install Python and yt-dlp
      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
        shell: pwsh

      # Step 3: Download YouTube video
      - name: Download YouTube video
        run: |
          # Replace the URL below with your video
          yt-dlp "https://www.youtube.com/watch?v=dQw4w9WgXcQ" -o "video.mp4"
        shell: pwsh

      # Step 4: Upload the downloaded video as an artifact
      - name: Upload video as artifact
        uses: actions/upload-artifact@v3
        with:
          name: youtube-video
          path: video.mp4