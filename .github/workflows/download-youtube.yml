name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo and initialize LFS
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      # Install Node.js
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install yt-dlp
      - name: Install yt-dlp
        run: |
          python3 -m pip install --upgrade pip
          pip3 install yt-dlp

      # Add cookies
      - name: Add cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # Download video
      - name: Download YouTube video
        run: |
          mkdir -p videos
          yt-dlp \
            --cookies cookies.txt \
            --no-playlist \
            --js-runtimes node \
            -f "bv*[height<=720]+ba/b[height<=720]" \
            -o "videos/video.%(ext)s" \
            "${{ inputs.youtube_url }}"

      # Track video folder with Git LFS
      - name: Track videos with Git LFS
        run: |
          git lfs track "videos/*"
          git add .gitattributes

      # Commit and push video
      - name: Commit and push video
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add videos/
          git commit -m "Add downloaded YouTube video via Git LFS" || echo "No changes to commit"
          git push