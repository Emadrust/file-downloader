name: Download YouTube Video

on:
  workflow_dispatch:

jobs:
  download_youtube:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
        shell: pwsh

      - name: Download YouTube video
        run: |
          # Replace the URL below with the YouTube video you want
          yt-dlp "https://www.youtube.com/watch?v=dQw4w9WgXcQ" -o "video.mp4"
        shell: pwsh

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: video.mp4