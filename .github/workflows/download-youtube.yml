name: Download YouTube Video to Repo

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      filename:
        description: 'Filename to save as (MP4, max ~100MB)'
        required: true
        type: string

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Download YouTube video
        run: |
          yt-dlp "${{ inputs.youtube_url }}" -o "${{ inputs.filename }}"

      - name: Commit and push video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.filename }}"
          git commit -m "Add YouTube video: ${{ inputs.youtube_url }}" || echo "No changes"
          git push