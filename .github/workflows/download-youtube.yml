name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Install Git LFS
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      # Install Node.js
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install yt-dlp
      - name: Install yt-dlp
        run: |
          python3 -m pip install --upgrade pip
          pip3 install yt-dlp

      # Add cookies
      - name: Add cookies
        run: |
          cat <<EOF > cookies.txt
          ${{ secrets.YOUTUBE_COOKIES }}
          EOF

      # Download video
      - name: Download YouTube video
        run: |
          mkdir -p videos
          yt-dlp \
            --cookies cookies.txt \
            --no-playlist \
            --js-runtimes node \
            --remote-components ejs:github \
            -f "bv*[height<=720]+ba/b[height<=720]/b[height<=720]" \
            -o "videos/%(title)s.%(ext)s" \
            "${{ inputs.youtube_url }}"

      # Commit and push based on file size
      - name: Commit and push video
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Loop through downloaded videos
          for f in videos/*; do
            size=$(stat -c%s "$f")  # Linux/macOS

            if [ $size -lt 104857600 ]; then
              echo "$f is <100 MB → commit normally"
              git add "$f"
            else
              echo "$f is >=100 MB → track with LFS"
              git lfs track "$f"
              git add "$f" .gitattributes
            fi
          done

          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add downloaded YouTube videos"

            # Pull remote changes first to avoid non-fast-forward errors
            git pull --rebase origin main

            # Push the commit
            git push origin main
          fi